name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    # Официальный способ установки uv в GitHub Actions
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        version: "latest"

    - name: Install dependencies
      run: uv sync

    - name: Test with pytest
      env:
        # Твой флаг для тестов
        APP_CONFIG__SITE__ENVIRONMENT: testing
      run: uv run pytest
